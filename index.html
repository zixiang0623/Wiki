<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>栞 -shiori- | Wikipediaリーダー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   0. リセット & 共通トークン
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;}
html,body{height:100%;}
body{margin:0;overflow:hidden;}
a{color:inherit;text-decoration:none;}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0;}
input{font:inherit;color:inherit;}
ul{margin:0;padding:0;list-style:none;}
img{max-width:100%;}
::selection{background:var(--accent);color:var(--on-accent);}

:root{
  --radius-sm:8px; --radius-md:14px; --radius-lg:22px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:48px;
  --header-h:64px;
  --font-scale:1;
  --transition-theme: background-color .5s ease, color .5s ease, border-color .5s ease, box-shadow .5s ease;
}

/* ---------- THEME: paper (白基調 / 和紙エディトリアル) ---------- */
[data-theme="paper"]{
  --font-display:'Noto Sans';
  --font-body:'Noto Sans';
  --font-ui:'Noto Sans';
  --font-mono:'DM Mono', monospace;
  --bg:#FAF9F4;
  --bg-image:none;
  --surface:#FFFFFF;
  --surface-2:#F3F1E8;
  --surface-3:#EAE6D8;
  --text:#211F1A;
  --text-dim:#5E5A4E;
  --text-faint:#94907E;
  --accent:#2B4A6F;
  --accent-soft:#EDF1F5;
  --accent-2:#AE3B32;
  --on-accent:#FFFFFF;
  --border:#E3DFD0;
  --border-strong:#CFC9B4;
  --radius:6px;
  --shadow-card:0 1px 2px rgba(30,25,10,.05), 0 1px 0 rgba(30,25,10,.03);
  --shadow-raised:0 6px 20px rgba(30,25,10,.08);
  --shadow-pressed:inset 0 1px 3px rgba(30,25,10,.12);
  --blur:0px;
  --surface-alpha:1;
  --card-border-w:1px;
}
/* ---------- THEME: depth (3D / ソフトUI) ---------- */
[data-theme="depth"]{
  --font-display:'Noto Sans';
  --font-body:'Noto Sans';
  --font-ui:'Noto Sans';
  --font-mono:'DM Mono', monospace;
  --bg:#E8EBF1;
  --bg-image:none;
  --surface:#EEF1F6;
  --surface-2:#E4E8EF;
  --surface-3:#DBE0E9;
  --text:#2E3542;
  --text-dim:#606B7C;
  --text-faint:#8B93A3;
  --accent:#FF7A59;
  --accent-soft:#FFE8E1;
  --accent-2:#2FC9C4;
  --on-accent:#FFFFFF;
  --border:transparent;
  --border-strong:#c9cfda;
  --radius:20px;
  --shadow-card:8px 8px 16px #c7cbd4, -8px -8px 16px #ffffff;
  --shadow-raised:10px 10px 22px #c3c8d2, -10px -10px 22px #ffffff;
  --shadow-pressed:inset 5px 5px 10px #c7cbd4, inset -5px -5px 10px #ffffff;
  --blur:0px;
  --surface-alpha:1;
  --card-border-w:0px;
}
/* ---------- THEME: glass (レイヤーUI / グラスモーフィズム) ---------- */
[data-theme="glass"]{
  --font-display:'Noto Sans';
  --font-body:'Noto Sans';
  --font-ui:'Noto Sans';
  --font-mono:'DM Mono', monospace;
  --bg:#0E1120;
  --bg-image:
    radial-gradient(60% 50% at 15% 10%, rgba(124,156,255,.30), transparent 60%),
    radial-gradient(50% 45% at 90% 15%, rgba(77,232,208,.22), transparent 60%),
    radial-gradient(70% 60% at 50% 100%, rgba(157,102,255,.24), transparent 60%);
  --surface:rgba(255,255,255,.06);
  --surface-2:rgba(255,255,255,.045);
  --surface-3:rgba(255,255,255,.09);
  --text:#EDEFF7;
  --text-dim:#AFB4CC;
  --text-faint:#767ba0;
  --accent:#8CA6FF;
  --accent-soft:rgba(140,166,255,.16);
  --accent-2:#4DE8D0;
  --on-accent:#0E1120;
  --border:rgba(255,255,255,.14);
  --border-strong:rgba(255,255,255,.24);
  --radius:18px;
  --shadow-card:0 8px 30px rgba(0,0,0,.35);
  --shadow-raised:0 16px 44px rgba(0,0,0,.45);
  --shadow-pressed:inset 0 1px 8px rgba(0,0,0,.3);
  --blur:22px;
  --surface-alpha:1;
  --card-border-w:1px;
}

body{
  background:var(--bg);
  background-image:var(--bg-image);
  background-attachment:fixed;
  color:var(--text);
  font-family:var(--font-body);
  transition:var(--transition-theme);
}

/* ============================================================
   1. レイアウト骨格
   ============================================================ */
#app{height:100vh;display:flex;flex-direction:column;}

.top-bar{
  height:var(--header-h);
  display:flex;align-items:center;gap:var(--sp-4);
  padding:0 var(--sp-5);
  background:var(--surface);
  border-bottom:var(--card-border-w) solid var(--border);
  box-shadow:var(--shadow-card);
  backdrop-filter:blur(var(--blur));
  -webkit-backdrop-filter:blur(var(--blur));
  position:relative;z-index:40;
  flex-shrink:0;
  transition:var(--transition-theme);
}
.brand{
  display:flex;align-items:center;gap:var(--sp-2);
  font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:.02em;
  flex-shrink:0;
  cursor:pointer;
  user-select:none;
}
.brand .mark{
  width:30px;height:30px;border-radius:var(--radius);
  background:linear-gradient(145deg,var(--accent),var(--accent-2));
  display:flex;align-items:center;justify-content:center;
  color:var(--on-accent);font-size:15px;font-weight:800;font-family:var(--font-ui);
  box-shadow:var(--shadow-card);
}
.brand span.name{color:var(--text);}
.brand span.sub{font-family:var(--font-ui);font-size:10px;color:var(--text-faint);font-weight:500;letter-spacing:.12em;text-transform:uppercase;display:block;margin-top:-2px;}

.search-wrap{flex:1;max-width:560px;position:relative;}
.search-box{
  display:flex;align-items:center;gap:var(--sp-2);
  background:var(--surface-2);
  border:var(--card-border-w) solid var(--border);
  border-radius:999px;
  padding:0 var(--sp-4);
  height:40px;
  box-shadow:var(--shadow-pressed);
  transition:var(--transition-theme), box-shadow .2s;
}
.search-box:focus-within{
  box-shadow:0 0 0 3px var(--accent-soft), var(--shadow-pressed);
}
.search-box svg{width:16px;height:16px;flex-shrink:0;color:var(--text-faint);}
.search-box input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:var(--font-ui);font-size:14px;color:var(--text);
  height:100%;
}
.search-box input::placeholder{color:var(--text-faint);}
.search-lang-pill{
  flex-shrink:0;font-family:var(--font-mono);font-size:11px;font-weight:500;
  color:var(--text-dim);background:var(--surface-3);border-radius:999px;
  padding:3px 9px;letter-spacing:.03em;
}
.suggest-panel{
  position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:var(--surface);
  border:var(--card-border-w) solid var(--border);
  border-radius:var(--radius-md);
  box-shadow:var(--shadow-raised);
  backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
  overflow:hidden;
  max-height:min(60vh,420px);overflow-y:auto;
  display:none;
  z-index:50;
}
.suggest-panel.open{display:block;}
.suggest-item{
  display:flex;flex-direction:column;gap:2px;
  padding:10px var(--sp-4);cursor:pointer;
  border-bottom:1px solid var(--border);
}
.suggest-item:last-child{border-bottom:none;}
.suggest-item:hover,.suggest-item.active{background:var(--accent-soft);}
.suggest-title{font-family:var(--font-ui);font-size:13.5px;font-weight:600;color:var(--text);}
.suggest-title mark{background:none;color:var(--accent);font-weight:700;}
.suggest-snippet{font-size:12px;color:var(--text-faint);font-family:var(--font-ui);line-height:1.5;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;}
.suggest-empty{padding:16px;font-size:12.5px;color:var(--text-faint);font-family:var(--font-ui);text-align:center;}

/* ---------- 多言語ドロップダウン ---------- */
.lang-dropdown-wrap{position:relative;}
.lang-dropdown{
  position:absolute;top:calc(100% + 8px);right:0;width:300px;
  max-height:min(70vh,480px);overflow-y:auto;
  background:var(--surface);
  border:var(--card-border-w) solid var(--border);
  border-radius:var(--radius-md);
  box-shadow:var(--shadow-raised);
  backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
  padding:var(--sp-3);
  display:none;z-index:55;
  transition:var(--transition-theme);
}
.lang-dropdown.open{display:block;}
.lang-dropdown-heading{
  font-family:var(--font-ui);font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-faint);margin:4px 4px 8px;
}
.lang-version-list{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.lang-version-item{
  display:flex;align-items:center;gap:8px;width:100%;text-align:left;
  padding:8px 10px;border-radius:var(--radius-sm);
  background:var(--surface-2);border:var(--card-border-w) solid var(--border);
  transition:var(--transition-theme), border-color .15s, transform .15s;
}
.lang-version-item:hover{border-color:var(--accent);transform:translateX(2px);}
.lv-code{
  font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--accent);
  background:var(--accent-soft);padding:2px 6px;border-radius:4px;flex-shrink:0;
}
.lv-name{font-family:var(--font-ui);font-size:12px;font-weight:600;color:var(--text);flex-shrink:0;white-space:nowrap;}
.lv-title{
  font-family:var(--font-ui);font-size:11px;color:var(--text-faint);flex:1;text-align:right;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.lang-chip-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.lang-chip{
  display:flex;flex-direction:column;align-items:flex-start;gap:2px;
  padding:8px 10px;border-radius:var(--radius-sm);text-align:left;
  background:var(--surface-2);border:var(--card-border-w) solid var(--border);
  transition:var(--transition-theme), border-color .15s;
}
.lang-chip:hover{border-color:var(--accent);}
.lang-chip.active{background:var(--accent);border-color:transparent;}
.lang-chip.active .lc-code,.lang-chip.active .lc-name{color:var(--on-accent);}
.lc-code{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--accent);}
.lc-name{font-family:var(--font-ui);font-size:11.5px;font-weight:600;color:var(--text);}
.lang-empty-note{font-family:var(--font-ui);font-size:11.5px;color:var(--text-faint);padding:4px;margin-bottom:10px;line-height:1.6;}

.top-controls{display:flex;align-items:center;gap:var(--sp-2);flex-shrink:0;}
.icon-btn{
  width:36px;height:36px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  background:var(--surface-2);
  border:var(--card-border-w) solid var(--border);
  box-shadow:var(--shadow-card);
  color:var(--text-dim);
  transition:var(--transition-theme), transform .15s, color .15s;
}
.icon-btn svg{width:16px;height:16px;}
.icon-btn:hover{color:var(--accent);transform:translateY(-1px);}
.icon-btn:active{box-shadow:var(--shadow-pressed);transform:translateY(0);}
.icon-btn:disabled{opacity:.35;pointer-events:none;}
.icon-btn.on{color:var(--on-accent);background:var(--accent);}

.font-ctrl{display:flex;align-items:center;background:var(--surface-2);border:var(--card-border-w) solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-card);overflow:hidden;}
.font-ctrl button{width:32px;height:36px;font-family:var(--font-ui);font-weight:700;color:var(--text-dim);font-size:12px;}
.font-ctrl button:hover{color:var(--accent);}
.font-ctrl button:first-child{font-size:10px;}
.font-ctrl button:last-child{font-size:15px;}

.theme-picker{display:flex;gap:6px;}
.theme-swatch{
  width:30px;height:30px;border-radius:50%;position:relative;cursor:pointer;
  border:2px solid transparent;
  transition:transform .2s, border-color .2s;
  flex-shrink:0;
}
.theme-swatch:hover{transform:translateY(-2px) scale(1.06);}
.theme-swatch.active{border-color:var(--text);}
.theme-swatch[data-t="paper"]{background:linear-gradient(135deg,#FAF9F4 50%,#2B4A6F 50%);}
.theme-swatch[data-t="depth"]{background:linear-gradient(135deg,#EEF1F6 50%,#FF7A59 50%);box-shadow:2px 2px 5px rgba(0,0,0,.15), -1px -1px 3px rgba(255,255,255,.6);}
.theme-swatch[data-t="glass"]{background:linear-gradient(135deg,#0E1120 45%,#8CA6FF 100%);}

/* ---------- 履歴タブ ---------- */
.history-bar{
  display:flex;align-items:center;gap:6px;
  padding:8px var(--sp-5);
  overflow-x:auto;
  background:var(--surface-2);
  border-bottom:var(--card-border-w) solid var(--border);
  flex-shrink:0;
  scrollbar-width:thin;
  transition:var(--transition-theme);
}
.history-bar::-webkit-scrollbar{height:4px;}
.history-bar::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px;}
.history-bar.empty{display:none;}
.hist-pill{
  flex-shrink:0;
  display:flex;align-items:center;gap:6px;
  font-family:var(--font-ui);font-size:12px;font-weight:500;
  padding:6px 12px 6px 12px;border-radius:999px;
  background:var(--surface);border:var(--card-border-w) solid var(--border);
  color:var(--text-dim);
  cursor:pointer;white-space:nowrap;
  box-shadow:var(--shadow-card);
  transition:transform .15s;
}
.hist-pill:hover{transform:translateY(-1px);box-shadow:8px 8px 16px #c7cbd4, -8px -8px 16px #ffffff;}
.hist-pill.current{color:var(--on-accent);background:var(--accent);font-weight:700;}
.hist-pill .n{font-family:var(--font-mono);font-size:9px;opacity:.6;}
.hist-pill .hp-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;}
.hist-close{
  flex-shrink:0;width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;cursor:pointer;
  color:var(--text-faint);font-size:12px;font-weight:700;
  padding:0;margin-left:2px;
  border-radius:4px;
  transition:color .15s, background .15s;
}
.hist-close:hover{color:var(--accent-2);background:var(--accent-soft);}
.hist-pill.current .hist-close{color:rgba(255,255,255,.7);}
.hist-pill.current .hist-close:hover{background:rgba(0,0,0,.15);}


/* ---------- メインレイアウト ---------- */
.layout{flex:1;display:flex;overflow:hidden;min-height:0;}

.panel{
  background:var(--surface);
  transition:var(--transition-theme);
}

.toc-panel{
  width:250px;flex-shrink:0;
  border-right:var(--card-border-w) solid var(--border);
  overflow-y:auto;
  padding:var(--sp-5) var(--sp-4);
  transition:width .25s ease, padding .25s ease, var(--transition-theme);
}
.toc-panel.collapsed{width:0;padding-left:0;padding-right:0;overflow:hidden;border-right:none;}
.toc-heading{
  font-family:var(--font-ui);font-size:11px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--text-faint);margin-bottom:var(--sp-3);
  padding-left:var(--sp-2);
}
.toc-list a{
  display:block;padding:6px var(--sp-2) 6px calc(var(--sp-2) + (var(--lvl,1) - 1) * 12px);
  font-family:var(--font-ui);font-size:12.5px;color:var(--text-dim);
  border-radius:var(--radius-sm);
  line-height:1.4;
  border-left:2px solid transparent;
}
.toc-list a:hover{color:var(--accent);background:var(--accent-soft);}
.toc-list a.active{color:var(--accent);font-weight:700;border-left-color:var(--accent);background:var(--accent-soft);}
.toc-empty{font-family:var(--font-ui);font-size:12px;color:var(--text-faint);padding:var(--sp-2);}

.content-panel{
  flex:1;overflow-y:auto;overflow-x:hidden;min-width:0;
  scroll-behavior:smooth;
}
.content-inner{
  max-width:760px;margin:0 auto;
  padding:var(--sp-7) var(--sp-6) 120px;
}
.content-inner.is-home{padding-bottom:var(--sp-7);}

.info-panel{
  width:300px;flex-shrink:0;
  border-left:var(--card-border-w) solid var(--border);
  overflow-y:auto;
  display:flex;flex-direction:column;
  transition:width .25s ease, var(--transition-theme);
}
.info-panel.collapsed{width:0;overflow:hidden;border-left:none;}
.info-tabs{display:flex;border-bottom:var(--card-border-w) solid var(--border);flex-shrink:0;}
.info-tab{
  flex:1;padding:12px 0;text-align:center;
  font-family:var(--font-ui);font-size:12px;font-weight:700;
  color:var(--text-faint);
  border-bottom:2px solid transparent;
}
.info-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.info-body{flex:1;overflow-y:auto;padding:var(--sp-4);}
.info-section{display:none;}
.info-section.active{display:block;}

.card{
  background:var(--surface-2);
  border:var(--card-border-w) solid var(--border);
  border-radius:var(--radius-md);
  padding:var(--sp-4);
  box-shadow:var(--shadow-card);
  margin-bottom:var(--sp-3);
  transition:var(--transition-theme);
}
.card h4{margin:0 0 var(--sp-2);font-family:var(--font-ui);font-size:11px;font-weight:700;color:var(--text-faint);letter-spacing:.08em;text-transform:uppercase;}
.card p{margin:0;font-size:12.5px;line-height:1.7;color:var(--text-dim);font-family:var(--font-ui);}

.bm-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:var(--sp-3);border-radius:var(--radius-sm);
  border:var(--card-border-w) solid var(--border);
  background:var(--surface-2);
  margin-bottom:8px;cursor:pointer;
  transition:var(--transition-theme), transform .15s;
}
.bm-item:hover{transform:translateX(2px);border-color:var(--border-strong);}
.bm-item .bt{font-family:var(--font-ui);font-size:13px;font-weight:600;color:var(--text);flex:1;}
.bm-item .bd{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);}
.bm-remove{flex-shrink:0;color:var(--text-faint);font-size:16px;line-height:1;padding:2px;}
.bm-remove:hover{color:var(--accent-2);}
.empty-note{font-family:var(--font-ui);font-size:12px;color:var(--text-faint);text-align:center;padding:var(--sp-6) var(--sp-3);line-height:1.7;}

/* ---------- ステータスバー ---------- */
.status-bar{
  height:44px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--sp-5);
  background:var(--surface);
  border-top:var(--card-border-w) solid var(--border);
  font-family:var(--font-mono);font-size:11px;color:var(--text-faint);
  transition:var(--transition-theme);
}
.status-left,.status-right{display:flex;align-items:center;gap:var(--sp-3);}
.status-btn{color:var(--text-dim);font-family:var(--font-ui);font-weight:600;font-size:11.5px;display:flex;align-items:center;gap:4px;}
.status-btn:hover{color:var(--accent);}
.status-btn svg{width:13px;height:13px;}

/* ============================================================
   2. ホーム画面
   ============================================================ */
.home-screen{padding:var(--sp-7) 0;}
.home-hero{text-align:center;margin-bottom:var(--sp-7);}
.home-mark{
  width:64px;height:64px;border-radius:var(--radius-lg);margin:0 auto var(--sp-4);
  background:linear-gradient(145deg,var(--accent),var(--accent-2));
  display:flex;align-items:center;justify-content:center;
  color:var(--on-accent);font-family:var(--font-display);font-size:30px;font-weight:700;
  box-shadow:var(--shadow-raised);
}
.home-title{font-family:var(--font-display);font-size:32px;font-weight:700;margin:0 0 var(--sp-2);letter-spacing:.01em;}
.home-desc{font-family:var(--font-ui);font-size:14px;color:var(--text-dim);max-width:420px;margin:0 auto;line-height:1.8;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:var(--sp-5);}
.chip{
  font-family:var(--font-ui);font-size:12.5px;font-weight:600;
  padding:9px 16px;border-radius:999px;
  background:var(--surface-2);border:var(--card-border-w) solid var(--border);
  color:var(--text-dim);box-shadow:var(--shadow-card);
  transition:var(--transition-theme), transform .15s, color .15s;
}
.chip:hover{color:var(--accent);transform:translateY(-2px);border-color:var(--accent);}
.chip .em{margin-right:6px;}

.home-random{display:flex;justify-content:center;margin-top:var(--sp-6);}
.settings-list{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:10px;}
.settings-row{
  display:flex;align-items:center;justify-content:space-between;gap:var(--sp-4);
  padding:var(--sp-4);border-radius:var(--radius-md);
  background:var(--surface-2);border:var(--card-border-w) solid var(--border);
  box-shadow:var(--shadow-card);
}
.settings-label h4{margin:0 0 4px;font-family:var(--font-ui);font-size:13px;font-weight:700;color:var(--text);}
.settings-label p{margin:0;font-family:var(--font-ui);font-size:12px;color:var(--text-faint);}
.settings-fontctrl{flex-shrink:0;}
.btn-primary{
  font-family:var(--font-ui);font-size:13.5px;font-weight:700;
  padding:12px 26px;border-radius:999px;
  background:var(--accent);color:var(--on-accent);
  box-shadow:var(--shadow-card);
  display:flex;align-items:center;gap:8px;
  transition:transform .15s, box-shadow .15s;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:var(--shadow-raised);}
.btn-primary svg{width:15px;height:15px;}

/* ============================================================
   3. ローディング / エラー
   ============================================================ */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px 0;gap:var(--sp-4);}
.spinner{
  width:38px;height:38px;border-radius:50%;
  border:3px solid var(--surface-3);border-top-color:var(--accent);
  animation:spin 0.85s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-family:var(--font-ui);font-size:12.5px;color:var(--text-faint);letter-spacing:.04em;}
.error-box{
  text-align:center;padding:80px var(--sp-5);
}
.error-box h3{font-family:var(--font-display);font-size:22px;margin:0 0 var(--sp-2);}
.error-box p{font-family:var(--font-ui);font-size:13px;color:var(--text-faint);margin:0 0 var(--sp-4);}

/* ============================================================
   4. 記事本文 (.wiki-content) — Wikipedia由来HTMLの正規化
   ============================================================ */
.article-header{margin-bottom:var(--sp-5);position:relative;}
.article-eyebrow{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-mono);font-size:11px;color:var(--text-faint);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;
}
.article-title{
  font-family:var(--font-display);
  font-size:calc(34px * var(--font-scale));
  font-weight:700;line-height:1.3;margin:0 0 6px;letter-spacing:.01em;
}
.article-sub{font-family:var(--font-ui);font-size:12.5px;color:var(--text-faint);}
.article-sub a{color:var(--accent);}
.article-sub a:hover{text-decoration:underline;}
.article-actions{display:flex;gap:8px;margin-top:var(--sp-4);}
.mini-btn{
  display:flex;align-items:center;gap:6px;
  font-family:var(--font-ui);font-size:12px;font-weight:600;
  padding:7px 13px;border-radius:999px;
  background:var(--surface-2);border:var(--card-border-w) solid var(--border);
  color:var(--text-dim);box-shadow:var(--shadow-card);
}
.mini-btn:hover{color:var(--accent);}
.mini-btn.saved{color:var(--on-accent);background:var(--accent-2);border-color:transparent;}
.mini-btn svg{width:13px;height:13px;}

.wiki-content{
  font-family:var(--font-body);
  font-size:calc(16px * var(--font-scale));
  line-height:1.95;
  color:var(--text);
  word-break:break-word;
}
.wiki-content > p{margin:0 0 1.3em;}
.wiki-content b,.wiki-content strong{font-weight:700;}
.wiki-content h2{
  font-family:var(--font-display);font-weight:700;
  font-size:calc(23px * var(--font-scale));
  margin:2.2em 0 .9em;padding-bottom:.4em;
  border-bottom:var(--card-border-w) solid var(--border);
  scroll-margin-top:20px;
}
.wiki-content h3{
  font-family:var(--font-display);font-weight:600;
  font-size:calc(18px * var(--font-scale));
  margin:1.8em 0 .7em;scroll-margin-top:20px;
}
.wiki-content h4{
  font-family:var(--font-ui);font-weight:700;
  font-size:calc(14.5px * var(--font-scale));
  margin:1.5em 0 .6em;color:var(--text-dim);scroll-margin-top:20px;
}
.wiki-content h2:first-child,.wiki-content h3:first-child{margin-top:0;}
.wiki-content a{color:var(--accent);border-bottom:1px solid var(--accent-soft);}
.wiki-content a:hover{border-bottom-color:var(--accent);}
.wiki-content a.new{color:var(--accent-2);}
.wiki-content a.ext-link{color:var(--text-dim);border-bottom-style:dashed;}
.wiki-content ul,.wiki-content ol{margin:0 0 1.3em;padding-left:1.5em;}
.wiki-content li{margin-bottom:.4em;}
.wiki-content .mw-editsection{display:none !important;}
.wiki-content sup.reference{font-size:.72em;}
.wiki-content sup.reference a{
  background:var(--surface-2);border-bottom:none;
  padding:1px 4px;border-radius:4px;font-weight:700;color:var(--accent);
}
.wiki-content .hatnote,.wiki-content .dablink{
  font-family:var(--font-ui);font-size:12.5px;font-style:italic;color:var(--text-faint);
  padding:8px 12px;background:var(--surface-2);border-radius:var(--radius-sm);
  margin-bottom:1.2em;border-left:3px solid var(--accent-2);
}
.wiki-content .ambox{
  font-family:var(--font-ui);font-size:12.5px;color:var(--text-dim);
  padding:10px 14px;background:var(--surface-2);border-radius:var(--radius-sm);
  margin-bottom:1.2em;border-left:3px solid var(--accent-2);
}

/* テーブル・インフォボックス */
.wiki-content table{
  border-collapse:collapse;font-size:.86em;background:var(--surface-2)!important;
  color:var(--text)!important;max-width:100%;
}
.wiki-content table th,.wiki-content table td{
  border:1px solid var(--border)!important;padding:6px 10px;background:transparent!important;
}
.wiki-content .infobox-wrap{
  float:right;clear:right;width:min(300px,100%);max-width:100%;
  margin:0 0 var(--sp-4) var(--sp-5);
  border-radius:var(--radius-md);
  overflow:hidden;
  box-shadow:var(--shadow-card);
}
.wiki-content .infobox-wrap.nested{
  float:none;width:100%;max-width:100%;margin:10px 0;
  box-shadow:none;border:var(--card-border-w) solid var(--border);
}
.wiki-content .infobox{
  width:100%!important;max-width:100%!important;float:none!important;
  margin:0!important;font-size:.82em;
  table-layout:fixed;
}
.wiki-content .infobox caption{
  font-family:var(--font-display);font-weight:700;font-size:1.15em;
  padding:10px;background:var(--accent);color:var(--on-accent)!important;
  word-break:break-word;overflow-wrap:anywhere;
}
.wiki-content .infobox caption a,
.wiki-content .infobox caption a:visited{
  color:var(--on-accent)!important;
  border-bottom-color:rgba(255,255,255,.45)!important;
}
.wiki-content .infobox img{width:auto;max-width:100%;height:auto;display:block;margin:0 auto;}
.wiki-content .infobox th,.wiki-content .infobox td{
  word-break:break-word;overflow-wrap:anywhere;white-space:normal!important;
}
.wiki-content .infobox th{text-align:left;font-family:var(--font-ui);font-weight:700;color:var(--text-dim)!important;}

.table-scroll{overflow-x:auto;margin-bottom:1.3em;border-radius:var(--radius-sm);}
.table-scroll table{width:max-content;min-width:100%;margin:0;}
.table-scroll::-webkit-scrollbar{height:6px;}
.table-scroll::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px;}

/* 画像 / サムネイル */
.wiki-content .thumb{
  background:transparent;border:none;
  max-width:min(280px,100%)!important;width:auto!important;
  margin:0 0 var(--sp-4) var(--sp-5);
}
.wiki-content .thumb.tleft{float:left;margin:0 var(--sp-5) var(--sp-4) 0;}
.wiki-content .thumb.tright,.wiki-content .thumb:not(.tleft){float:right;}
.wiki-content .thumbinner{
  background:var(--surface-2)!important;border:var(--card-border-w) solid var(--border)!important;
  border-radius:var(--radius-md);padding:6px;box-shadow:var(--shadow-card);
}
.wiki-content .thumbinner img{border-radius:calc(var(--radius-md) - 4px);width:100%;height:auto;}
.wiki-content .thumbcaption{
  font-family:var(--font-ui);font-size:11.5px;color:var(--text-faint);
  padding:8px 4px 2px;line-height:1.6;
}
.wiki-content .magnify{display:none;}
figure{margin:0;}

/* navbox は details に変換して折りたたみ */
.wiki-content details.navbox-wrap{
  margin:1.6em 0;background:var(--surface-2);border-radius:var(--radius-md);
  border:var(--card-border-w) solid var(--border);overflow:hidden;
}
.wiki-content details.navbox-wrap summary{
  font-family:var(--font-ui);font-size:12px;font-weight:700;color:var(--text-dim);
  padding:10px 14px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px;
}
.wiki-content details.navbox-wrap summary::-webkit-details-marker{display:none;}
.wiki-content details.navbox-wrap summary::before{content:"▸";color:var(--accent);transition:transform .2s;}
.wiki-content details.navbox-wrap[open] summary::before{transform:rotate(90deg);}
.wiki-content details.navbox-wrap .navbox{font-size:11px;padding:0 14px 12px;}

.wiki-content .reflist{font-size:.82em;color:var(--text-dim);}
.wiki-content .catlinks{display:none;}
.wiki-content .noprint,.wiki-content .mw-empty-elt{display:none;}
.wiki-content p:empty{display:none;}

/* 数式画像 */
.wiki-content .mwe-math-fallback-image-inline,.wiki-content img.mwe-math-fallback-image-display{
  filter:none;
}
[data-theme="glass"] .wiki-content img.mwe-math-fallback-image-inline,
[data-theme="glass"] .wiki-content img.mwe-math-fallback-image-display{filter:invert(.9);}

/* ============================================================
   5. モバイル / レスポンシブ
   ============================================================ */
.drawer-scrim{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:60;display:none;
  backdrop-filter:blur(2px);
}
.drawer-scrim.show{display:block;}

@media (max-width:900px){
  .top-bar{padding:0 var(--sp-3);gap:var(--sp-2);}
  .brand span.sub{display:none;}
  .theme-picker{display:none;}
  .font-ctrl{display:none;}
  .font-ctrl.settings-fontctrl{display:flex!important;}
  .lang-dropdown{position:fixed;top:var(--header-h);left:8px;right:8px;width:auto;max-height:min(70vh,70dvh);}
  .toc-panel,.info-panel{
    position:fixed;top:var(--header-h);bottom:0;z-index:70;
    box-shadow:var(--shadow-raised);
  }
  .toc-panel{left:0;transform:translateX(-100%);transition:transform .25s ease;width:78vw!important;max-width:300px;padding:var(--sp-5) var(--sp-4)!important;padding-bottom:calc(var(--sp-5) + env(safe-area-inset-bottom))!important;}
  .toc-panel.mobile-open{transform:translateX(0);}
  .info-panel{right:0;transform:translateX(100%);transition:transform .25s ease;width:82vw!important;max-width:340px;padding-bottom:env(safe-area-inset-bottom);}
  .info-panel.mobile-open{transform:translateX(0);}
  .toc-panel.collapsed,.info-panel.collapsed{width:78vw!important;overflow:visible;}
  .info-panel.collapsed{width:82vw!important;}
  .content-inner{padding:var(--sp-5) var(--sp-4) calc(100px + env(safe-area-inset-bottom));}
  .content-inner.is-home{padding-bottom:calc(var(--sp-5) + env(safe-area-inset-bottom));}
  .article-title{font-size:calc(26px * var(--font-scale));}
  .wiki-content .thumb,.wiki-content .infobox-wrap{float:none!important;width:100%!important;max-width:100%!important;margin:0 0 var(--sp-4)!important;}
  .home-title{font-size:26px;}
  .settings-row{flex-wrap:wrap;gap:10px;}
  .status-left .status-btn span.lbl{display:none;}
  .status-bar{padding-bottom:env(safe-area-inset-bottom);height:calc(44px + env(safe-area-inset-bottom));}
  .top-bar{padding-top:env(safe-area-inset-top);height:calc(var(--header-h) + env(safe-area-inset-top));}
}
@media (max-width:560px){
  .search-lang-pill{display:none;}
  .status-bar{padding-left:var(--sp-3);padding-right:var(--sp-3);}
  .brand .mark{width:26px;height:26px;font-size:13px;}
  .hist-pill{padding:5px 9px;font-size:11px;}
}
@media (max-width:400px){
  .icon-btn{width:32px;height:32px;}
  .top-controls{gap:6px;}
  .search-box{padding:0 var(--sp-3);}
  .home-mark{width:52px;height:52px;font-size:24px;}
  .home-title{font-size:22px;}
  .settings-row{padding:var(--sp-3);}
}
@media (max-height:480px) and (orientation:landscape){
  :root{--header-h:52px;}
  .home-screen{padding:var(--sp-5) 0;}
  .home-hero{margin-bottom:var(--sp-4);}
  .home-mark{width:44px;height:44px;font-size:20px;margin-bottom:var(--sp-2);}
  .content-inner{padding-top:var(--sp-4);}
  .status-bar{height:38px;}
}

/* フォーカス可視化 & モーション削減 */
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;transition-duration:.001ms!important;}
}
</style>
</head>
<body>
<div id="app" data-theme="depth">

  <!-- ============ ヘッダー ============ -->
  <header class="top-bar">
    <button class="icon-btn" id="tocToggle" title="目次">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
    </button>

    <div class="brand" id="brandHome" title="ホームへ">
      <div class="mark">栞</div>
      <div>
        <span class="name">shiori</span>

      </div>

    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="記事を検索…" autocomplete="off" />
        <span class="search-lang-pill" id="langPill">JA</span>
      </div>
      <div class="suggest-panel" id="suggestPanel"></div>
    </div>

    <div class="top-controls">
      <div class="lang-dropdown-wrap">
        <button class="icon-btn" id="langToggle" title="多言語切替">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </button>
        <div class="lang-dropdown" id="langPanel">
          <div id="langOtherVersions"></div>
          <div class="lang-dropdown-heading" id="langDefaultHeading">既定の表示言語</div>
          <div class="lang-chip-grid" id="langChipGrid"></div>
        </div>
      </div>
      <div class="font-ctrl">
        <button id="fontMinus" title="文字を小さく">A</button>
        <button id="fontPlus" title="文字を大きく">A</button>
      </div>
      <button class="icon-btn" id="infoToggle" title="この記事について / ブックマーク">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="15" y1="4" x2="15" y2="20"/></svg>
      </button>
    </div>
  </header>

  <!-- ============ 履歴タブ ============ -->
  <div class="history-bar empty" id="historyBar"></div>

  <!-- ============ メイン ============ -->
  <div class="layout">
    <div class="drawer-scrim" id="drawerScrim"></div>

    <aside class="panel toc-panel collapsed" id="tocPanel">
      <div class="toc-heading" id="tocHeadingLabel">目次</div>
      <ul class="toc-list" id="tocList"></ul>
    </aside>

    <main class="content-panel" id="contentPanel">
      <div class="content-inner" id="contentInner">
        <!-- ホーム / 記事 / ローディング がここに描画される -->
      </div>
    </main>

    <aside class="panel info-panel collapsed" id="infoPanel">
      <div class="info-tabs">
        <div class="info-tab active" data-tab="about" id="infoTabAboutLabel">概要</div>
        <div class="info-tab" data-tab="bookmarks" id="infoTabBookmarksLabel">ブックマーク</div>
      </div>
      <div class="info-body">
        <div class="info-section active" id="tabAbout"></div>
        <div class="info-section" id="tabBookmarks"></div>
      </div>
    </aside>
  </div>

  <!-- ============ ステータスバー ============ -->
  <footer class="status-bar">
    <div class="status-left">
      <button class="status-btn icon-btn" id="backBtn" disabled title="戻る">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="status-btn icon-btn" id="fwdBtn" disabled title="進む">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="status-btn" id="randomBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg><span class="lbl">ランダム</span></button>
    </div>
    <div class="status-right">
      <span id="statusMsg">読書の準備ができました</span>
    </div>
  </footer>

</div>

<script>

/* ============================================================
   API ヘルパー
   ============================================================ */
function apiUrl(lang){ return `https://${lang}.wikipedia.org/w/api.php`; }

async function apiGet(lang, params){
  const url = new URL(apiUrl(lang));
  params.format = 'json';
  params.formatversion = '2';
  params.origin = '*';
  Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
  const res = await fetch(url.toString());
  if(!res.ok) throw new Error('network');
  return res.json();
}

async function searchWiki(lang, query, limit=8){
  const data = await apiGet(lang, {action:'query', list:'search', srsearch:query, srlimit:limit, srprop:'snippet'});
  return (data.query && data.query.search) ? data.query.search : [];
}

async function fetchArticle(lang, title){
  const data = await apiGet(lang, {action:'parse', page:title, prop:'text|sections|displaytitle|langlinks', redirects:'true'});
  return data.parse;
}

async function fetchRandomTitle(lang){
  const data = await apiGet(lang, {action:'query', list:'random', rnnamespace:0, rnlimit:1});
  return (data.query && data.query.random && data.query.random[0]) ? data.query.random[0].title : null;
}

   ============================================================ */
function applyTheme(name){
  state.theme = name;
  app.setAttribute('data-theme', name);
  localStorage.setItem('shiori_theme', name);
  document.querySelectorAll('.theme-swatch').forEach(s => s.classList.toggle('active', s.dataset.t === name));
}
function applyFontScale(){
  document.documentElement.style.setProperty('--font-scale', state.fontScale.toFixed(2));
  localStorage.setItem('shiori_font', state.fontScale);
}
function applyLangPill(){
  langPill.textContent = state.lang.toUpperCase();
}
function applyFontByLang(){
  const fontMap = {
    ja: "'Noto Sans JP'",
    en: "'Noto Sans'",
    zh: "'Noto Sans SC'",
    ko: "'Noto Sans KR'",
    fr: "'Noto Sans'",
    de: "'Noto Sans'",
    es: "'Noto Sans'",
    pt: "'Noto Sans'",
    ru: "'Noto Sans'",
    it: "'Noto Sans'",
    ar: "'Noto Sans Arabic'",
    hi: "'Noto Sans Devanagari'",
    vi: "'Noto Sans'",
    id: "'Noto Sans'"
  };
  const font = fontMap[state.lang] || "'Noto Sans'";
  document.documentElement.style.setProperty('--font-display', font);
  document.documentElement.style.setProperty('--font-body', font);
  document.documentElement.style.setProperty('--font-ui', font);
}

/* ============================================================
   検索
   ============================================================ */
let searchDebounce = null;
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  clearTimeout(searchDebounce);
  if(!q){ closeSuggest(); return; }
  searchDebounce = setTimeout(() => runSearch(q), 260);
});
searchInput.addEventListener('keydown', (e) => {
  const items = suggestPanel.querySelectorAll('.suggest-item');
  if(e.key === 'ArrowDown'){ e.preventDefault(); moveSuggest(1, items); }
  else if(e.key === 'ArrowUp'){ e.preventDefault(); moveSuggest(-1, items); }
  else if(e.key === 'Enter'){
    e.preventDefault();
    if(state.suggestIndex >= 0 && state.suggestItems[state.suggestIndex]){
      const title = state.suggestItems[state.suggestIndex].title;
      closeSuggest();
      loadArticle(title, state.lang);
    } else if(searchInput.value.trim()){
      const q = searchInput.value.trim();
      closeSuggest();
      loadArticle(q, state.lang);
    } else {
      closeSuggest();
    }
  } else if(e.key === 'Escape'){
    closeSuggest(); searchInput.blur();
  }
});
function moveSuggest(dir, items){
  if(!items.length) return;
  state.suggestIndex = (state.suggestIndex + dir + items.length) % items.length;
  items.forEach((it,i) => it.classList.toggle('active', i === state.suggestIndex));
  items[state.suggestIndex].scrollIntoView({block:'nearest'});
}
async function runSearch(query){
  const seq = ++state.searchSeq;
  try{
    const results = await searchWiki(state.lang, query, 8);
    if(seq !== state.searchSeq) return; // 選択済み/新しい検索により無効化された結果は破棄
    state.suggestItems = results;
    state.suggestIndex = -1;
    if(!results.length){
      suggestPanel.innerHTML = `<div class="suggest-empty">${t('suggestNoResults', escapeHtml(query))}</div>`;
    } else {
      suggestPanel.innerHTML = results.map(r => `
        <div class="suggest-item" data-title="${escapeAttr(r.title)}">
          <div class="suggest-title">${escapeHtml(r.title)}</div>
          <div class="suggest-snippet">${sanitizeSnippet(r.snippet)}</div>
        </div>`).join('');
      suggestPanel.querySelectorAll('.suggest-item').forEach(item => {
        item.addEventListener('click', () => { closeSuggest(); loadArticle(item.dataset.title, state.lang); });
      });
    }
    suggestPanel.classList.add('open');
  }catch(err){
    if(seq !== state.searchSeq) return;
    suggestPanel.innerHTML = `<div class="suggest-empty">${t('suggestSearchFailed')}</div>`;
    suggestPanel.classList.add('open');
  }
}
function closeSuggest(){
  clearTimeout(searchDebounce); // 保留中の遅延検索も確実にキャンセルし、閉じた後の再表示を防ぐ
  state.searchSeq++; // 進行中の検索結果を無効化し、後から再表示されるのを防ぐ
  suggestPanel.classList.remove('open'); suggestPanel.innerHTML=''; state.suggestIndex=-1;
}
document.addEventListener('click', (e) => {
  if(!e.target.closest('.search-wrap')) closeSuggest();
});
function sanitizeSnippet(html){
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent.length > 90 ? tmp.textContent.slice(0,90) + '…' : tmp.textContent;
}

/* ============================================================
   記事読み込み & 描画
   ============================================================ */
async function loadArticle(title, lang, opts){
  opts = opts || {};
  const seq = ++state.requestSeq;
  searchInput.value = '';
  closeSuggest();
  renderLoading();
  closeMobileDrawers();

  try{
    const parsed = await fetchArticle(lang, title);
    if(seq !== state.requestSeq) return; // 新しいリクエストで上書き済み
    if(!parsed){ throw new Error('not-found'); }

    state.lang = lang;
    applyLangPill();
    applyFontByLang(); applyStaticUIText();
    const finalTitle = parsed.title;
    state.currentTitle = finalTitle;
    state.currentSections = parsed.sections || [];
    state.currentLanglinks = (parsed.langlinks || []).slice().sort((a,b) => (a.autonym||a.langname||a.lang).localeCompare(b.autonym||b.langname||b.lang));

    renderArticle(parsed);
    buildTOC(parsed.sections || []);

    if(opts.jumpOnly){
      // 既存タブへのジャンプ(戻る/進む・タブクリック) — 履歴配列(タブ一覧)自体は変更しない
    } else if(opts.pushHistory){
      // 明示的に新しいタブとして追加する場合のみ
      state.history = state.history.slice(0, state.historyIndex + 1);
      state.history.push({title: finalTitle, lang});
      state.historyIndex = state.history.length - 1;
    } else {
      // デフォルト: 新しいタブを開かず、常に今のタブの中身を差し替える
      if(state.historyIndex < 0 || !state.history.length){
        state.history.push({title: finalTitle, lang});
        state.historyIndex = state.history.length - 1;
      } else {
        state.history[state.historyIndex] = {title: finalTitle, lang};
      }
    }
    renderHistoryBar();
    updateNavButtons();
    renderLangPanel();
    contentInner.scrollTop = 0;
    el('contentPanel').scrollTop = 0;
    statusMsg.textContent = t('statusViewing', finalTitle, LANGS_FULL[lang]);
  }catch(err){
    if(seq !== state.requestSeq) return;
    renderError(title);
  }
}

/* ---- Wikipedia HTML の後処理: 崩れ対策 ---- */
function postProcessContent(root){
  // script は完全除去（安全対策）
  root.querySelectorAll('script,style').forEach(n => n.remove());

  // 画像のプロトコル相対URLを補正 + lazy load
  root.querySelectorAll('img').forEach(img => {
    const src = img.getAttribute('src') || '';
    if(src.startsWith('//')) img.src = 'https:' + src;
    img.loading = 'lazy';
    img.removeAttribute('srcset');
    img.removeAttribute('width');
    img.removeAttribute('height');
  });

  // infobox は div でラップして角丸クリップを一箇所に統一（caption/内側テーブルの角丸・直角混在を防止）
  root.querySelectorAll('table.infobox').forEach(tbl => {
    if(tbl.parentElement && tbl.parentElement.classList.contains('infobox-wrap')) return;
    const isNested = !!tbl.parentElement.closest('table.infobox');
    const wrap = document.createElement('div');
    wrap.className = 'infobox-wrap' + (isNested ? ' nested' : '');
    tbl.parentNode.insertBefore(wrap, tbl);
    wrap.appendChild(tbl);
  });

  // 大きな一般テーブル (wikitable等) は横スクロールできるようラップ
  root.querySelectorAll('table.wikitable, table.sortable, table:not(.infobox):not(.navbox)').forEach(tbl => {
    if(tbl.closest('.infobox') || tbl.closest('.navbox')) return;
    if(tbl.parentElement && tbl.parentElement.classList.contains('table-scroll')) return;
    const wrap = document.createElement('div');
    wrap.className = 'table-scroll';
    tbl.parentNode.insertBefore(wrap, tbl);
    wrap.appendChild(tbl);
  });

  // navbox は details に格納して折りたたむ（表示崩れ・巨大化防止）
  root.querySelectorAll('table.navbox, div.navbox').forEach(nav => {
    if(nav.closest('details.navbox-wrap')) return;
    const details = document.createElement('details');
    details.className = 'navbox-wrap';
    const summary = document.createElement('summary');
    const label = nav.querySelector('.navbox-title, th');
    summary.textContent = t('navPrefix') + (label ? label.textContent.trim().slice(0,40) : t('navGeneric'));
    nav.parentNode.insertBefore(details, nav);
    details.appendChild(summary);
    details.appendChild(nav);
  });

  // 不要な編集リンク・空要素・座標プラグイン等を除去
  root.querySelectorAll('.mw-editsection, .mw-indicators, sup.noprint, .error').forEach(n => n.remove());

  // 相対 / プロトコル相対リンクを正規化
  root.querySelectorAll('a[href]').forEach(a => {
    let href = a.getAttribute('href');
    if(!href) return;
    if(href.startsWith('//')) a.setAttribute('href', 'https:' + href);
    if(href.startsWith('#')) return; // 同一ページアンカーはそのまま
  });
}

/* ---- 記事内リンクのクリックをインターセプトして SPA 的に遷移 ---- */
function attachContentLinkHandlers(root){
  root.addEventListener('click', (e) => {
    const a = e.target.closest('a');
    if(!a) return;
    const href = a.getAttribute('href') || '';

    // 同一記事内アンカー
    if(href.startsWith('#')){
      e.preventDefault();
      const targetId = decodeURIComponent(href.slice(1));
      const targetEl = root.querySelector(`#${CSS.escape(targetId)}`) || document.getElementById(targetId);
      if(targetEl) targetEl.scrollIntoView({behavior:'smooth', block:'start'});
      return;
    }

    // 内部 wiki リンク /wiki/Title
    const m = href.match(/^\/wiki\/([^#?]+)/);
    if(m){
      e.preventDefault();
      const rawTitle = decodeURIComponent(m[1].replace(/_/g, ' '));
      if(/^(File|ファイル|Category|カテゴリ|Special|特別|Help|ヘルプ|Wikipedia|Portal|ポータル|Template|テンプレート):/i.test(rawTitle)){
        window.open(`https://${state.lang}.wikipedia.org${href}`, '_blank', 'noopener');
        return;
      }
      loadArticle(rawTitle, state.lang);
      return;
    }

    // 絶対URLでも同言語版wikiへのリンクなら内部遷移
    try{
      const u = new URL(href, `https://${state.lang}.wikipedia.org`);
      if(u.hostname.endsWith('.wikipedia.org') && u.pathname.startsWith('/wiki/')){
        const lg = u.hostname.split('.')[0];
        const t = decodeURIComponent(u.pathname.replace('/wiki/','').replace(/_/g,' '));
        if(!/^(File|ファイル|Category|カテゴリ|Special|特別):/i.test(t)){
          e.preventDefault();
          loadArticle(t, LANG_ORDER.includes(lg) ? lg : state.lang);
          return;
        }
      }
    }catch(_e){ /* 相対でない普通の外部リンクはそのまま新規タブ推奨 */ }

    // 外部リンクは新しいタブ
    if(/^https?:\/\//.test(href)){
      a.target = '_blank';
      a.rel = 'noopener';
    }
  });
}

/* ============================================================
   目次 (TOC)
   ============================================================ */
function buildTOC(sections){
  if(!sections.length){
    tocList.innerHTML = `<li class="toc-empty">${t('tocEmpty')}</li>`;
    return;
  }
  tocList.innerHTML = sections.map(s => {
    const lvl = Math.min(parseInt(s.toclevel,10) || 1, 4);
    return `<li><a href="#" data-anchor="${escapeAttr(s.anchor)}" style="--lvl:${lvl}">${escapeHtml(s.line.replace(/<[^>]+>/g,''))}</a></li>`;
  }).join('');
  tocList.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const target = document.getElementById(a.dataset.anchor);
      if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
      tocList.querySelectorAll('a').forEach(x => x.classList.remove('active'));
      a.classList.add('active');
      if(window.innerWidth <= 900) closeMobileDrawers();
    });
  });
}

/* ============================================================
   履歴バー
   ============================================================ */
function renderHistoryBar(){
  if(state.history.length <= 1){
    historyBar.classList.add('empty');
    historyBar.innerHTML = '';
    return;
  }
  historyBar.classList.remove('empty');
  historyBar.innerHTML = state.history.map((h,i) => `
    <div class="hist-pill ${i === state.historyIndex ? 'current':''} ${h.home ? 'is-home':''}" data-idx="${i}">
      <span class="n">${h.home ? '＋' : (i+1)}</span><span class="hp-title">${h.home ? escapeHtml(t('welcomeTitle')) : escapeHtml(h.title)}</span>
      <button class="hist-close" data-remove-idx="${i}" title="${escapeAttr(t('tabCloseTitle'))}">✕</button>
    </div>`).join('');
  historyBar.querySelectorAll('.hist-pill').forEach(p => {
    p.addEventListener('click', () => jumpToHistory(parseInt(p.dataset.idx,10)));
    p.querySelector('.hist-close').addEventListener('click', (e) => {
      e.stopPropagation();
      removeHistoryTab(parseInt(e.target.dataset.removeIdx,10));
    });
  });
  const current = historyBar.querySelector('.hist-pill.current');
  if(current) current.scrollIntoView({inline:'center', block:'nearest'});
}
function jumpToHistory(idx){
  if(idx < 0 || idx >= state.history.length || idx === state.historyIndex) return;
  state.historyIndex = idx;
  const h = state.history[idx];
  if(h.home){
    renderHome();
    renderHistoryBar();
    updateNavButtons();
  } else {
    loadArticle(h.title, h.lang, {jumpOnly:true});
  }
}
function removeHistoryTab(idx){
  if(idx < 0 || idx >= state.history.length) return;
  state.history.splice(idx, 1);
  if(state.historyIndex >= state.history.length) state.historyIndex = state.history.length - 1;
  if(state.historyIndex < 0){
    renderHome();
  } else {
    const h = state.history[state.historyIndex];
    if(h.home){ renderHome(); } else { loadArticle(h.title, h.lang, {jumpOnly:true}); }
  }
  renderHistoryBar();
  updateNavButtons();
}
function openNewTab(){
  state.history = state.history.slice(0, state.historyIndex + 1);
  state.history.push({home:true});
  state.historyIndex = state.history.length - 1;
  renderHome();
  renderHistoryBar();
  updateNavButtons();
}
function updateNavButtons(){
  backBtn.disabled = state.historyIndex <= 0;
  fwdBtn.disabled = state.historyIndex >= state.history.length - 1;
}
backBtn.addEventListener('click', () => jumpToHistory(state.historyIndex - 1));
fwdBtn.addEventListener('click', () => jumpToHistory(state.historyIndex + 1));

/* ============================================================
   ブックマーク
   ============================================================ */
function toggleBookmark(title){
  const idx = state.bookmarks.findIndex(b => b.title === title && b.lang === state.lang);
  if(idx >= 0){
    state.bookmarks.splice(idx,1);
  } else {
    state.bookmarks.unshift({title, lang: state.lang, ts: Date.now(), snippet: state.currentExtractSnippet});
  }
  localStorage.setItem('shiori_bookmarks', JSON.stringify(state.bookmarks));
  if(state.currentTitle === title) renderArticleBookmarkBtn(title);
  renderBookmarksTab();
}
function renderArticleBookmarkBtn(title){
  const btn = el('bookmarkBtn');
  if(!btn) return;
  const isBookmarked = state.bookmarks.some(b => b.title === title && b.lang === state.lang);
  btn.classList.toggle('saved', isBookmarked);
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="${isBookmarked?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>${isBookmarked?t('bookmarkSaved'):t('bookmarkAdd')}`;
}
function renderBookmarksTab(){
  const wrap = el('tabBookmarks');
  if(!state.bookmarks.length){
    wrap.innerHTML = `<div class="empty-note">${t('bookmarksEmpty')}</div>`;
    return;
  }
  wrap.innerHTML = state.bookmarks.map((b,i) => `
    <div class="bm-item" data-idx="${i}">
      <div style="flex:1">
        <div class="bt">${escapeHtml(b.title)}</div>
        <div class="bd">${LANGS_FULL[b.lang] || b.lang} · ${new Date(b.ts).toLocaleDateString('ja-JP')}</div>
      </div>
      <div class="bm-remove" data-remove="${i}">✕</div>
    </div>`).join('');
  wrap.querySelectorAll('.bm-item').forEach(item => {
    item.addEventListener('click', (e) => {
      if(e.target.closest('[data-remove]')) return;
      const b = state.bookmarks[parseInt(item.dataset.idx,10)];
      loadArticle(b.title, b.lang);
    });
  });
  wrap.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      state.bookmarks.splice(parseInt(btn.dataset.remove,10),1);
      localStorage.setItem('shiori_bookmarks', JSON.stringify(state.bookmarks));
      renderBookmarksTab();
      if(state.currentTitle) renderArticleBookmarkBtn(state.currentTitle);
    });
  });
}

    <div class="card">
      <h4>${t('aboutTocCardTitle')}</h4>
      <p>${t('aboutTocCardDesc', state.currentSections.length)}</p>
    </div>
  `;
  wrap.querySelectorAll('[data-lang][data-title]').forEach(btn => {
    btn.addEventListener('click', () => {
      const targetLang = btn.dataset.lang;
      state.lang = targetLang;
      localStorage.setItem('shiori_lang', targetLang);
      applyLangPill();
      loadArticle(btn.dataset.title, targetLang);
    });
  });
  renderBookmarksTab();
}

/* ============================================================
   タブ切替 (概要 / ブックマーク)
   ============================================================ */
document.querySelectorAll('.info-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.info-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.info-section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    el('tab' + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1)).classList.add('active');
  });
});

/* ============================================================
   パネル開閉 (TOC / Info) — デスクトップ & モバイル
   ============================================================ */
function isMobile(){ return window.innerWidth <= 900; }

el('tocToggle').addEventListener('click', () => {
  if(isMobile()){
    tocPanel.classList.toggle('mobile-open');
    infoPanel.classList.remove('mobile-open');
    drawerScrim.classList.toggle('show', tocPanel.classList.contains('mobile-open'));
  } else {
    tocPanel.classList.toggle('collapsed');
  }
});
el('infoToggle').addEventListener('click', () => {
  if(isMobile()){
    infoPanel.classList.toggle('mobile-open');
    tocPanel.classList.remove('mobile-open');
    drawerScrim.classList.toggle('show', infoPanel.classList.contains('mobile-open'));
  } else {
    infoPanel.classList.toggle('collapsed');
  }
});
drawerScrim.addEventListener('click', closeMobileDrawers);
function closeMobileDrawers(){
  tocPanel.classList.remove('mobile-open');
  infoPanel.classList.remove('mobile-open');
  drawerScrim.classList.remove('show');
}

/* ============================================================
   テーマ / フォント / 言語 UI
   ============================================================ */
document.querySelectorAll('.theme-swatch').forEach(sw => {
  sw.addEventListener('click', () => applyTheme(sw.dataset.t));
});
el('fontMinus').addEventListener('click', () => {
  state.fontScale = Math.max(0.8, +(state.fontScale - 0.1).toFixed(2));
  applyFontScale();
});
el('fontPlus').addEventListener('click', () => {
  state.fontScale = Math.min(1.5, +(state.fontScale + 0.1).toFixed(2));
  applyFontScale();
});
/* ---- 多言語ドロップダウン ---- */
function renderLangPanel(){
  const otherWrap = el('langOtherVersions');
  if(state.currentTitle && state.currentLanglinks && state.currentLanglinks.length){
    otherWrap.innerHTML = `
      <div class="lang-dropdown-heading">${t('langOtherVersionsHeading', state.currentLanglinks.length)}</div>
      <div class="lang-version-list">
        ${state.currentLanglinks.map(l => `
          <button class="lang-version-item" data-lang="${escapeAttr(l.lang)}" data-title="${escapeAttr(l.title)}">
            <span class="lv-code">${escapeHtml(l.lang.toUpperCase())}</span>
            <span class="lv-name">${escapeHtml(l.autonym || l.langname || l.lang)}</span>
            <span class="lv-title">${escapeHtml(l.title)}</span>
          </button>`).join('')}
      </div>`;
    otherWrap.querySelectorAll('.lang-version-item').forEach(btn => {
      btn.addEventListener('click', () => {
        const targetLang = btn.dataset.lang;
        state.lang = targetLang;
        localStorage.setItem('shiori_lang', targetLang);
        applyLangPill();
        loadArticle(btn.dataset.title, targetLang);
        closeLangPanel();
      });
    });
  } else if(state.currentTitle){
    otherWrap.innerHTML = `<div class="lang-empty-note">${t('langOtherVersionsEmpty')}</div>`;
  } else {
    otherWrap.innerHTML = '';
  }

  const grid = el('langChipGrid');
  grid.innerHTML = LANG_ORDER.map(code => `
    <button class="lang-chip ${code === state.lang ? 'active' : ''}" data-lang="${code}">
      <span class="lc-code">${code.toUpperCase()}</span>
      <span class="lc-name">${escapeHtml(LANGS_FULL[code])}</span>
    </button>`).join('');
  grid.querySelectorAll('.lang-chip').forEach(btn => {
    btn.addEventListener('click', () => switchBrowseLanguage(btn.dataset.lang));
  });
}
function switchBrowseLanguage(target){
  if(target === state.lang){ closeLangPanel(); return; }
  // 開いている記事があれば、実際の他言語版タイトルへ直接ジャンプを試みる
  if(state.currentTitle && state.currentLanglinks){
    const match = state.currentLanglinks.find(l => l.lang === target);
    state.lang = target;
    localStorage.setItem('shiori_lang', target);
    applyLangPill();
    applyFontByLang(); applyStaticUIText();
    if(match){
      loadArticle(match.title, target);
    } else {
      statusMsg.textContent = t('langNoTranslation', state.currentTitle, LANGS_FULL[target]);
      renderLangPanel();
    }
    closeLangPanel();
    return;
  }
  state.lang = target;
  localStorage.setItem('shiori_lang', target);
  applyLangPill();
  applyFontByLang(); applyStaticUIText();
  statusMsg.textContent = t('langSwitchedDefault', LANGS_FULL[target]);
  if(!state.currentTitle) renderHome();
  closeLangPanel();
}
function closeLangPanel(){ el('langPanel').classList.remove('open'); }
el('langToggle').addEventListener('click', (e) => {
  e.stopPropagation();
  const panel = el('langPanel');
  const willOpen = !panel.classList.contains('open');
  closeSuggest();
  if(willOpen){ renderLangPanel(); panel.classList.add('open'); }
  else{ panel.classList.remove('open'); }
});
document.addEventListener('click', (e) => {
  if(!e.target.closest('.lang-dropdown-wrap')) closeLangPanel();
});
el('brandHome').addEventListener('click', renderHome);

/* ============================================================
   キーボードショートカット
   ============================================================ */
function isTypingTarget(target){
  return target === searchInput || (target && (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable));
}
document.addEventListener('keydown', (e) => {
  if(e.key === '/' && document.activeElement !== searchInput){
    e.preventDefault();
    searchInput.focus();
  }
  if(e.altKey && e.key === 'ArrowLeft'){ e.preventDefault(); jumpToHistory(state.historyIndex - 1); }
  if(e.altKey && e.key === 'ArrowRight'){ e.preventDefault(); jumpToHistory(state.historyIndex + 1); }

  // Shift+W: 現在開いているタブを閉じる
  if(e.shiftKey && e.code === 'KeyW' && !isTypingTarget(e.target)){
    e.preventDefault();
    if(state.historyIndex >= 0) removeHistoryTab(state.historyIndex);
  }

  // Shift+N: 新しいタブ(ようこそ画面)を開く
  if(e.shiftKey && e.code === 'KeyN' && !isTypingTarget(e.target)){
    e.preventDefault();
    openNewTab();
  }
});

/* ============================================================
   ユーティリティ
   ============================================================ */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }

/* ============================================================
   初期化
   ============================================================ */
applyTheme(state.theme);
applyFontScale();
applyLangPill();
applyFontByLang(); applyStaticUIText();
renderHome();

})();
</script>
